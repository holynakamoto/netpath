name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]" build

      - name: Run tests
        run: pytest

      - name: Build package artifacts
        run: python -m build --sdist --wheel

      - name: Check package artifacts for generated environment files
        run: |
          python - <<'PY'
          import tarfile
          import zipfile
          from pathlib import Path

          offenders = []
          for artifact in Path("dist").iterdir():
              if artifact.suffix == ".whl":
                  with zipfile.ZipFile(artifact) as zf:
                      names = zf.namelist()
              elif artifact.suffixes[-2:] == [".tar", ".gz"]:
                  with tarfile.open(artifact) as tf:
                      names = tf.getnames()
              else:
                  continue
              offenders.extend(
                  name for name in names
                  if "/.venv/" in f"/{name}" or "__pycache__/" in name or name.endswith(".pyc")
              )
          if offenders:
              raise SystemExit("generated files in artifacts:\n" + "\n".join(offenders))
          PY
